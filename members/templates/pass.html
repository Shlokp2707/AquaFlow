<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <title>Document</title>
    
</head>
<body>
  

<div class="flex flex-col items-center justify-center min-h-screen bg-slate-100 p-4">
    
    <div id="capture-pass" class="relative w-full max-w-sm overflow-hidden bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 group">
        
        <div class="bg-gradient-to-r from-cyan-500 to-purple-600 p-8 text-center relative">
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">AquaFlow</h1>
            <p class="text-cyan-100 text-[10px] font-bold tracking-[0.2em] mt-1 uppercase">Official Entry Pass</p>
        </div>

        <div class="p-8 space-y-6 bg-white">
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 bg-gradient-to-tr from-cyan-50 to-purple-50 rounded-full border-4 border-white shadow-lg flex items-center justify-center mb-4 overflow-hidden">
                    <span class="text-3xl">🏊</span>
                </div>
                <h2 class="text-2xl font-black text-gray-900 uppercase">{{name}}</h2>
                <p class="text-purple-600 font-bold text-sm tracking-widest bg-purple-50 px-3 py-1 rounded-full">ID: {{id}}</p>
            </div>

            <div class="grid grid-cols-2 gap-4 border-y border-gray-100 py-6">
                <div class="text-center border-r border-gray-100">
                    <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Plan</p>
                    <p class="text-sm font-bold text-gray-800 uppercase">{{plan}}</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Valid Upto </p>
                    <p class="text-sm font-bold text-gray-800 uppercase">{{valid_upto}}</p>
                </div>
            </div>

            <div class="flex flex-col items-center py-2">
                <div class="p-4 bg-white border-2 border-dashed border-cyan-200 rounded-3xl">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=AquaFlow_JohnDoe" 
                         alt="QR" class="w-32 h-32">
                </div>
                <p class="mt-4 text-[10px] text-gray-400 font-bold uppercase tracking-[0.3em]">Scan for Entry</p>
            </div>
        </div>

        <div class="bg-gray-900 p-6 text-center text-white">
            <p class="text-[10px] font-medium opacity-80 mb-2">📍{{address}}</p>
            <div class="flex justify-center items-center gap-3 text-cyan-400 font-black text-[10px] uppercase tracking-widest">
                <span>📞 {{phoneno}}</span>
            </div>
        </div>

        <div class="absolute top-[280px] -left-4 w-8 h-8 bg-slate-100 rounded-full"></div>
        <div class="absolute top-[280px] -right-4 w-8 h-8 bg-slate-100 rounded-full"></div>
    </div>

    <button onclick="downloadPass()" 
        class="mt-8 px-8 py-4 bg-gradient-to-r from-red-500 to-red-600 text-white font-black rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        DOWNLOAD PASS 
    </button>
</div>

<script>
    function downloadPass() {
        const pass = document.getElementById('capture-pass');
        
        // Use html2canvas to capture the div
        html2canvas(pass, {
            backgroundColor: null,
            scale: 2, // Higher quality
            useCORS: true // Allows loading the QR code image from an external API
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'AquaFlow-Pass.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>
</body>
</html>
