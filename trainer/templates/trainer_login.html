<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Login | Swimming Pool Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lottie Player for the swimming animation -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        /* Custom styles for the Inter font and consistent hover effect */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Keyframes for the subtle bubble animation */
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0) translateX(0); }
            30% { transform: translateY(-50px) translateX(20px); }
            60% { transform: translateY(20px) translateX(-30px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow infinite;
        }
    </style>
    <!-- Setting Inter as the default font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-50 via-cyan-300 to-cyan-200 relative overflow-hidden">

    <!-- Floating subtle bubbles (Adjusted for custom slow bounce) -->
    <div class="absolute inset-0 overflow-hidden opacity-40">
        <div class="absolute w-6 h-6 bg-cyan-200 rounded-full animate-bounce-slow blur-md" style="left: 10%; animation-duration: 12s; top: 20%;"></div>
        <div class="absolute w-10 h-10 bg-teal-200 rounded-full animate-bounce-slow blur-lg" style="left: 70%; animation-duration: 15s; top: 80%;"></div>
        <div class="absolute w-8 h-8 bg-sky-200 rounded-full animate-bounce-slow blur-sm" style="left: 40%; animation-duration: 10s; top: 50%;"></div>
    </div>

    <!-- Card: Glassmorphism Style -->
    <div class="relative z-10 bg-white/30 backdrop-blur-xl shadow-2xl rounded-3xl p-8 w-[90%] max-w-md border border-teal-100 transition-all duration-300 hover:shadow-xl hover:scale-[1.01]">

        <!-- Animation -->
        <div class="flex justify-center mb-4">
            <lottie-player src="https://assets2.lottiefiles.com/packages/lf20_w51pcehl.json" background="transparent" speed="1"
                style="width: 120px; height: 120px;" loop autoplay></lottie-player>
        </div>

        <h1 class="text-3xl font-bold text-center text-teal-700 mb-6 tracking-wide">Trainer Login</h1>

        <!-- Form (Static, removed Django tags) -->
        <form action="#" method="POST" class="space-y-5">
                 {% csrf_token %}

            <div>
                <label for="teacher_email" class="text-gray-700 font-semibold text-sm">Email</label>
                <input type="email" id="teacher_email" name="email" required
                    class="w-full px-3 py-2 mt-1 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 transition-all placeholder-gray-400" 
                    placeholder="Enter your registered email" />
            </div>

            <div>
                <label for="teacher_password" class="text-gray-700 font-semibold text-sm">Password</label>
                <input type="password" id="teacher_password" name="password" required
                    class="w-full px-3 py-2 mt-1 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 transition-all placeholder-gray-400" 
                    placeholder="••••••••" />
            </div> 
            <button type="submit"
                class="w-full bg-gradient-to-r from-teal-500 to-cyan-600 text-white py-3 mt-2 rounded-xl font-bold hover:from-cyan-600 hover:to-teal-500 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-teal-300/50">
                Sign In
            </button>
        </form>
        
        <!-- Error Message Placeholder (Removed Django template tags) -->
        <div class="mt-4">
            <!-- This section is where server-side messages would appear in a live application -->
            <p class="text-red-700 font-bold text-sm text-center hidden">
                Invalid credentials. Please try again.
            </p>
        </div>
    </div>

</body>
</html>
